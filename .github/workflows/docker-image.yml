name: ECR_EKS_ARGO_CD CI

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  sbcrudk8s-ci:
    runs-on: ubuntu-latest

    steps:
    - name: Code Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Maven Build
      run: mvn clean package -DskipTests
      working-directory: k8scruddemo

    # 🔹 AWS Credentials Configure
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 🔹 Login to ECR
    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 🔹 Set variables
    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    # 🔹 Build Docker Image
    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/k8scruddemoapp:$IMAGE_TAG .
      working-directory: k8scruddemo

    # 🔹 Push to ECR
    - name: Push to ECR
      run: |
        docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/k8scruddemoapp:$IMAGE_TAG

    # -------- Install yq ----------
    - name: Install yq
      run: |
        sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
        sudo chmod +x /usr/bin/yq

    # -------- Update Deployment YAML ----------
    - name: Update image tag in Deployment file
      run: |
        IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/k8scruddemoapp:${GITHUB_SHA::7}

        yq -i ".spec.template.spec.containers[0].image = \"${IMAGE_URI}\"" k8scruddemo/k8s-cruddemoapp-deploy-svc.yml

    # -------- Commit updated file ----------
    - name: Commit and Push changes
      run: |
        git config --global user.email "github-actions@github.com"
        git config --global user.name "github-actions"

        git add k8scruddemo/k8s-cruddemoapp-deploy-svc.yml
        git commit -m "Update image tag to ${GITHUB_SHA::7}"
        git push
